name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install PowerShell
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq powershell

      - name: Full validation suite
        run: pwsh ./scripts/test.ps1 -Strict

      - name: Bash validation suite (CI)
        run: bash scripts/test.sh --strict

      - name: Skill audit
        run: bash scripts/skill-audit.sh --check

      - name: Verify skills.txt up to date
        run: |
          ls -d config/skills/*/ | grep -v _template | xargs -I{} basename {} | sort > /tmp/skills_fs.txt
          tr -d '' < config/skills.txt | sort > /tmp/skills_file.txt
          diff /tmp/skills_fs.txt /tmp/skills_file.txt || (echo "skills.txt out of date!"; exit 1)

      - name: Check install scripts headers
        run: |
          head -1 install.ps1 | grep -q 'pwsh' || (echo "install.ps1 bad shebang"; exit 1)
          head -1 install.sh | grep -q 'bash' || (echo "install.sh bad shebang"; exit 1)

      - name: Summary
        run: |
          echo "### Validation complete"
          echo "- opencode.json: validated"
          echo "- oh-my-openagent.json: validated"
          echo "- AGENTS.md: present"
          echo "- Skills: ecosystem validated"
          echo "- Installers: checked"
